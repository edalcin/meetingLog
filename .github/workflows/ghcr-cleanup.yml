name: GHCR Cleanup

on:
  schedule:
    - cron: '0 3 * * 0'  # weekly Sunday 3am UTC
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/delete-package-versions@v5
        with:
          package-name: meetinglog
          package-type: container
          min-versions-to-keep: 10
          delete-only-untagged-versions: true
