version: '3.8'
services:
  app:
    build: .
    ports:
      - "${APP_PORT:-3000}:${APP_PORT:-3000}"
    environment:
      - DB_PATH=${DB_PATH:-/data/db/meetinglog.sqlite}
      - APP_PIN=${APP_PIN}
      - APP_PORT=${APP_PORT:-3000}
      - FILES_PATH=${FILES_PATH:-/data/uploads}
    volumes:
      - db_data:/data/db
      - uploads_data:/data/uploads
    restart: unless-stopped
volumes:
  db_data:
  uploads_data:
