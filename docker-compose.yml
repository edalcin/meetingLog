services:
  app:
    image: ghcr.io/edalcin/meetinglog:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - /mnt/user/appdata/meetinglog/db:/data/db
      - /mnt/user/appdata/meetinglog/uploads:/data/uploads
    environment:
      APP_PIN: "change_me"
      DB_PATH: /data/db/meetinglog.sqlite
      FILES_PATH: /data/uploads
      BASE_URL: "https://your-domain.example.com/"
      APP_PORT: "3000"
    # /data must be writable by UID 65532 (distroless nonroot)
    # On UNRAID: chown -R 65532:65532 /mnt/user/appdata/meetinglog
