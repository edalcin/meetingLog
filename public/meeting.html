<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ficha da Reunião</title>

  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.bubble.css" />
  <script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    [x-cloak] { display: none !important; }
    #quill-viewer.ql-container.ql-bubble { border: none; }
    #quill-viewer .ql-editor { padding: 0; font-size: 0.875rem; line-height: 1.6; }
    @media print {
      header { display: none !important; }
      body { background: white !important; }
      .no-print { display: none !important; }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans" x-data="meetingPage()" x-init="init()">

  <!-- PIN screen -->
  <div x-show="!authenticated" x-cloak
       class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm">
      <div class="text-center mb-8">
        <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
          </svg>
        </div>
        <h1 class="text-xl font-bold text-gray-900">Ficha da Reunião</h1>
        <p class="text-gray-500 mt-1 text-sm">Digite o PIN de acesso</p>
      </div>
      <div class="space-y-4">
        <div>
          <input
            x-model="pinInput"
            type="password"
            inputmode="numeric"
            maxlength="20"
            placeholder="PIN"
            class="w-full px-4 py-3 border-2 rounded-xl text-center text-2xl tracking-widest focus:outline-none focus:border-indigo-500 transition-colors"
            :class="pinError ? 'border-red-400' : 'border-gray-200'"
            @keydown.enter="verifyPin()"
            x-ref="pinField"
          />
          <p x-show="pinError" class="text-red-500 text-sm mt-2 text-center">PIN incorreto. Tente novamente.</p>
        </div>
        <button
          @click="verifyPin()"
          :disabled="pinLoading"
          class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white font-semibold py-3 rounded-xl transition-colors">
          <span x-show="!pinLoading">Entrar</span>
          <span x-show="pinLoading">Verificando...</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Authenticated content -->
  <div x-show="authenticated" x-cloak>

    <header class="bg-white border-b border-gray-200 sticky top-0 z-10 no-print">
      <div class="max-w-3xl mx-auto px-4 sm:px-6">
        <div class="flex items-center h-14 gap-3">
          <svg class="w-5 h-5 text-indigo-600 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
          </svg>
          <span class="text-sm font-semibold text-gray-900">Ficha da Reunião</span>
        </div>
      </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 sm:px-6 py-8">

      <!-- Error -->
      <div x-show="error" class="bg-white rounded-xl border border-red-200 p-12 text-center">
        <svg class="w-12 h-12 mx-auto mb-3 text-red-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
        <p class="text-sm font-medium text-red-600" x-text="error"></p>
      </div>

      <!-- Loading -->
      <div x-show="loading && !error" class="flex items-center justify-center py-20">
        <div class="flex items-center gap-3 text-gray-400">
          <svg class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
          <span class="text-sm">Carregando...</span>
        </div>
      </div>

      <!-- Content -->
      <div x-show="!loading && !error && meeting">

        <!-- Title card -->
        <div class="bg-white rounded-xl border border-gray-200 p-6 mb-4">
          <div class="flex items-start justify-between gap-4">
            <div>
              <p class="text-2xl font-bold text-gray-900" x-text="formatDate(meeting?.data_hora)"></p>
              <p class="text-sm text-gray-500 mt-0.5" x-text="formatTime(meeting?.data_hora) + 'h'"></p>
            </div>
            <span class="shrink-0 text-xs font-semibold px-2.5 py-1 rounded-full"
                  :class="tipoBadge(meeting?.tipo)"
                  x-text="meeting?.tipo"></span>
          </div>
        </div>

        <!-- Participants -->
        <div x-show="meeting?.participantes?.length > 0" class="bg-white rounded-xl border border-gray-200 p-6 mb-4">
          <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Participantes</h2>
          <ul class="space-y-1.5">
            <template x-for="p in meeting?.participantes" :key="p.id">
              <li class="flex items-start gap-2">
                <svg class="w-4 h-4 text-gray-300 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
                <div>
                  <span class="text-sm text-gray-800" x-text="p.nome"></span>
                  <template x-if="p.cargo || p.instituicao">
                    <span class="text-xs text-gray-400 ml-1.5"
                          x-text="[p.cargo, p.instituicao].filter(Boolean).join(' · ')"></span>
                  </template>
                </div>
              </li>
            </template>
          </ul>
        </div>

        <!-- Projects -->
        <div x-show="meeting?.projetos?.length > 0" class="bg-white rounded-xl border border-gray-200 p-6 mb-4">
          <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Projetos</h2>
          <ul class="space-y-1.5">
            <template x-for="pr in meeting?.projetos" :key="pr.id">
              <li class="flex items-start gap-2">
                <svg class="w-4 h-4 text-gray-300 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
                </svg>
                <div>
                  <span class="text-sm text-gray-800" x-text="pr.nome"></span>
                  <template x-if="pr.instituicao_nomes">
                    <span class="text-xs text-gray-400 ml-1.5" x-text="pr.instituicao_nomes"></span>
                  </template>
                </div>
              </li>
            </template>
          </ul>
        </div>

        <!-- Pautas -->
        <div x-show="meeting?.pautas?.length > 0" class="bg-white rounded-xl border border-gray-200 p-6 mb-4">
          <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Pauta</h2>
          <ol class="space-y-1.5 list-decimal list-inside">
            <template x-for="item in meeting?.pautas" :key="item.id">
              <li class="text-sm text-gray-800" x-text="item.texto"></li>
            </template>
          </ol>
        </div>

        <!-- Links -->
        <div x-show="meeting?.links?.length > 0" class="bg-white rounded-xl border border-gray-200 p-6 mb-4">
          <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Links</h2>
          <ul class="space-y-1.5">
            <template x-for="lk in meeting?.links" :key="lk.id">
              <li>
                <a :href="lk.url" target="_blank" rel="noopener noreferrer"
                   class="inline-flex items-center gap-1.5 text-sm text-indigo-600 hover:text-indigo-800 hover:underline">
                  <svg class="w-3.5 h-3.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                  </svg>
                  <span x-text="lk.nome || lk.url"></span>
                </a>
              </li>
            </template>
          </ul>
        </div>

        <!-- Notas -->
        <div x-show="meeting?.notas" class="bg-white rounded-xl border border-gray-200 p-6 mb-4">
          <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Notas</h2>
          <div id="quill-viewer"></div>
        </div>

        <!-- Footer -->
        <p class="text-center text-xs text-gray-400 mt-6">
          Reunião #<span x-text="meeting?.id"></span>
          &nbsp;·&nbsp;
          Registrado em <span x-text="formatDate(meeting?.criado_em)"></span>
        </p>

      </div>
    </main>
  </div>

<script>
function meetingPage() {
  return {
    authenticated: false,
    pinInput: '',
    pinError: false,
    pinLoading: false,
    loading: false,
    error: null,
    meeting: null,

    async init() {
      if (sessionStorage.getItem('pin_ok') === '1') {
        this.authenticated = true
        await this.loadMeeting()
      } else {
        await this.$nextTick()
        this.$refs.pinField?.focus()
      }
    },

    async verifyPin() {
      if (!this.pinInput) return
      this.pinLoading = true
      this.pinError = false
      try {
        const res = await fetch('/api/auth/check', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pin: this.pinInput })
        })
        const data = await res.json()
        if (data.ok) {
          sessionStorage.setItem('pin_ok', '1')
          this.authenticated = true
          this.pinInput = ''
          await this.loadMeeting()
        } else {
          this.pinError = true
          this.pinInput = ''
          await this.$nextTick()
          this.$refs.pinField?.focus()
        }
      } catch {
        this.pinError = true
      }
      this.pinLoading = false
    },

    async loadMeeting() {
      const parts = window.location.pathname.split('/')
      const id = Number(parts[parts.length - 1])
      if (!id || isNaN(id)) {
        this.error = 'ID de reunião inválido.'
        return
      }
      this.loading = true
      try {
        const res = await fetch(`/api/meetings/${id}`)
        if (!res.ok) {
          const json = await res.json().catch(() => ({}))
          this.error = json.error ?? 'Reunião não encontrada.'
          this.loading = false
          return
        }
        this.meeting = await res.json()
        document.title = `Reunião ${this.formatDate(this.meeting.data_hora)} — Meeting Log`
        this.loading = false
        await this.$nextTick()
        this.initQuill()
      } catch {
        this.error = 'Erro ao carregar a reunião.'
        this.loading = false
      }
    },

    initQuill() {
      if (!this.meeting?.notas) return
      const quill = new Quill('#quill-viewer', {
        theme: 'bubble',
        readOnly: true,
        modules: { toolbar: false }
      })
      try {
        const parsed = JSON.parse(this.meeting.notas)
        if (parsed && Array.isArray(parsed.ops)) {
          quill.setContents(parsed)
          return
        }
      } catch {}
      quill.setText(typeof this.meeting.notas === 'string' ? this.meeting.notas : '')
    },

    formatDate(iso) {
      if (!iso) return ''
      const d = new Date(iso)
      return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' })
    },

    formatTime(iso) {
      if (!iso) return ''
      const d = new Date(iso)
      return d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
    },

    tipoBadge(tipo) {
      const map = {
        'Presencial': 'bg-green-100 text-green-700',
        'Online': 'bg-blue-100 text-blue-700',
        'Híbrida': 'bg-purple-100 text-purple-700',
      }
      return map[tipo] ?? 'bg-gray-100 text-gray-700'
    }
  }
}
</script>
</body>
</html>
